const today=()=>new Date().toISOString().split("T")[0];

// Generate bi-weekly pay period end dates (Saturdays) around current date
const generatePPEs=()=>{
  // ADM uses bi-weekly pay periods. Generate ~12 months of PPE end dates.
  // Based on the spreadsheet, PPE 01-11-2026 was a Sunday. Let's use Saturdays as end dates.
  const periods=[];
  // Start from a known PPE and generate forward/backward
  const base=new Date(2026,0,10); // Jan 10, 2026 (Saturday before the 01-11 PPE)
  for(let i=-12;i<14;i++){
    const d=new Date(base);
    d.setDate(d.getDate()+(i*14));
    periods.push(d.toISOString().split("T")[0]);
  }
  return periods;
};

    </div>{children}
  </div></div>;
}

              <div style={{flex:1,minWidth:110}}><label style={S.label}>Employee</label><select value={rptFilterEmployee} onChange={e=>setRptFilterEmployee(e.target.value)} style={{...selS,padding:"8px 10px"}}><option value="">All</option>{employees.map(e=><option key={e} value={e}>{e}</option>)}</select></div>

              {rptFilterDateFrom&&<span> · From: {rptFilterDateFrom}</span>}{rptFilterDateTo&&<span> · To: {rptFilterDateTo}</span>}

              <div className="grid-3" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:20,marginBottom:24}}>
                <div><label style={S.label}>Period Start *</label><input type="date" value={ppeDateFrom} onChange={e=>setPpeDateFrom(e.target.value)} style={S.input}/></div>
                <div><label style={S.label}>Period End *</label><input type="date" value={ppeDateTo} onChange={e=>setPpeDateTo(e.target.value)} style={S.input}/></div>
                <div><label style={S.label}>OT Threshold (hours)</label><input type="number" value={ppeOtThreshold} onChange={e=>setPpeOtThreshold(e.target.value)} style={S.input} min="0" step="1"/></div>
              </div>

              {(!ppeDateFrom||!ppeDateTo)?
                <div style={{padding:40,textAlign:"center",color:"#999",fontSize:13,border:"1px dashed #ccc"}}>Select a date range above to generate the pay period summary.</div>
              :ppeData.length===0?
                <div style={{padding:40,textAlign:"center",color:"#999",fontSize:13,border:"1px dashed #ccc"}}>No entries found for {ppeDateFrom} to {ppeDateTo}.</div>
              :(
                <div>
                  {/* Summary stats */}
                  <div className="grid-4" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:0,marginBottom:20,border:"2px solid #1a1a1a",background:"#fafaf7"}}>
                    {[
                      [ppeTotals.totalHours.toFixed(1),"Total Hours"],
                      [ppeTotals.regular.toFixed(1),"Regular"],
                      [ppeTotals.overtime.toFixed(1),"Overtime"],
                      [(ppeTotals.vacation+ppeTotals.sick+ppeTotals.holiday).toFixed(1),"Vac/Sick/Hol"]
                    ].map(([v,l],i)=>(
                      <div key={l} style={{textAlign:"center",padding:"16px 12px",borderLeft:i>0?"2px solid #1a1a1a":"none"}}>
                        <div style={{fontSize:24,fontWeight:800,lineHeight:1,color:l==="Overtime"&&parseFloat(v)>0?"#c00":"#1a1a1a"}}>{v}</div>
                        <div style={{fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",color:"#888",marginTop:4}}>{l}</div>
                      </div>
                    ))}
                  </div>

                  {/* Detail table */}
                  <div style={{overflowX:"auto",border:"2px solid #1a1a1a"}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                      <thead>
                        <tr style={{background:"#1a1a1a",color:"#fff"}}>
                          <th style={{...thStyle,textAlign:"left",position:"sticky",left:0,background:"#1a1a1a",zIndex:1}}>Employee</th>
                          <th style={{...thStyle,textAlign:"left"}}>Dept</th>
                          <th style={thStyle}>Total Hrs</th>
                          <th style={thStyle}>Job Hrs</th>
                          <th style={{...thStyle,color:"#8ecae6"}}>Vacation</th>
                          <th style={{...thStyle,color:"#ffb703"}}>Sick</th>
                          <th style={{...thStyle,color:"#90be6d"}}>Holiday</th>
                          <th style={{...thStyle,background:"#2a2a2a"}}>Regular</th>
                          <th style={{...thStyle,background:"#2a2a2a",color:"#ff6b6b"}}>Overtime</th>
                          <th style={{...thStyle,background:"#333"}}>Check</th>
                        </tr>
                      </thead>
                      <tbody>
                        {ppeData.map((e,i)=>(
                          <tr key={e.employee} style={{background:i%2===0?"#fff":"#fafaf7",borderBottom:"1px solid #eee"}}>
                            <td style={{padding:"10px 12px",fontWeight:600,whiteSpace:"nowrap",position:"sticky",left:0,background:i%2===0?"#fff":"#fafaf7",zIndex:1}}>{e.employee}</td>
                            <td style={{padding:"10px 12px"}}><span style={S.tag}>{e.department||"—"}</span></td>
                            <td style={{...tdStyle,fontWeight:700}}>{e.totalHours.toFixed(2)}</td>
                            <td style={tdStyle}>{e.jobHours.toFixed(2)}</td>
                            <td style={{...tdStyle,color:e.vacation>0?"#0077b6":"#ccc"}}>{e.vacation.toFixed(2)}</td>
                            <td style={{...tdStyle,color:e.sick>0?"#e85d04":"#ccc"}}>{e.sick.toFixed(2)}</td>
                            <td style={{...tdStyle,color:e.holiday>0?"#588157":"#ccc"}}>{e.holiday.toFixed(2)}</td>
                            <td style={{...tdStyle,fontWeight:700,background:i%2===0?"#f8f8f5":"#f3f3f0"}}>{e.regular.toFixed(2)}</td>
                            <td style={{...tdStyle,fontWeight:700,color:e.overtime>0?"#c00":"#ccc",background:i%2===0?"#f8f8f5":"#f3f3f0"}}>{e.overtime.toFixed(2)}</td>
                            <td style={{...tdStyle,color:Math.abs(e.checkFig)<0.01?"#2d6a4f":"#c00",fontWeight:600,background:i%2===0?"#f5f5f2":"#f0f0ed"}}>{Math.abs(e.checkFig)<0.01?"✓":e.checkFig.toFixed(2)}</td>
                          </tr>
                        ))}
                        {/* Totals row */}
                        <tr style={{background:"#1a1a1a",color:"#fff",fontWeight:700}}>
                          <td style={{padding:"12px 12px",position:"sticky",left:0,background:"#1a1a1a",zIndex:1}}>TOTALS</td>
                          <td style={{padding:"12px 12px"}}></td>
                          <td style={{...tdStyle,color:"#fff"}}>{ppeTotals.totalHours.toFixed(2)}</td>
                          <td style={{...tdStyle,color:"#fff"}}>{ppeTotals.jobHours.toFixed(2)}</td>
                          <td style={{...tdStyle,color:"#8ecae6"}}>{ppeTotals.vacation.toFixed(2)}</td>
                          <td style={{...tdStyle,color:"#ffb703"}}>{ppeTotals.sick.toFixed(2)}</td>
                          <td style={{...tdStyle,color:"#90be6d"}}>{ppeTotals.holiday.toFixed(2)}</td>
                          <td style={{...tdStyle,color:"#fff"}}>{ppeTotals.regular.toFixed(2)}</td>
                          <td style={{...tdStyle,color:"#ff6b6b"}}>{ppeTotals.overtime.toFixed(2)}</td>
                          <td style={{...tdStyle,color:Math.abs(ppeTotals.checkFig)<0.01?"#90be6d":"#ff6b6b"}}>{Math.abs(ppeTotals.checkFig)<0.01?"✓":ppeTotals.checkFig.toFixed(2)}</td>
                        </tr>
                      </tbody>
                    </table>
                  </div>

                  <div style={{marginTop:16,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
                    <div style={{fontSize:11,color:"#999",lineHeight:1.6}}>
                      <strong>How it works:</strong> Work hours over {ppeOtThreshold}h = Overtime. Vacation/Sick/Holiday are added to Regular (not OT).<br/>
                      <strong>Check column:</strong> ✓ means Reg + OT = Total Hours. A number means there's a discrepancy to investigate.
                    </div>
                    <button style={{...S.btnSm,background:"#1a1a1a",color:"#fff"}} onClick={()=>exportPayrollCSV(ppeData,`adm-payperiod-${ppeDateFrom}-to-${ppeDateTo}.csv`)}>EXPORT PAYROLL CSV</button>
                  </div>
                </div>
              )}
            </div>
          </div>
        )}

        <div style={{marginTop:40,paddingTop:16,borderTop:"1px solid #ccc",fontSize:11,color:"#999",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
          <span>ADM Job Tracker · v2.1</span>
          <span>Data saves automatically · {entries.length} entries stored</span>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
